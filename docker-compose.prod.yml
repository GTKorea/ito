services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ito
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ito_prod_change_me}
      POSTGRES_DB: ito
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ito"]
      interval: 5s
      timeout: 3s
      retries: 5

  ito-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ito:${DB_PASSWORD:-ito_prod_change_me}@postgres:5432/ito?schema=public
      JWT_SECRET: ${ITO_JWT_SECRET}
      JWT_REFRESH_SECRET: ${ITO_JWT_REFRESH_SECRET}
      JWT_EXPIRATION: "15m"
      JWT_REFRESH_EXPIRATION: "7d"
      API_PORT: "3001"
      FRONTEND_URL: ${ITO_FRONTEND_URL:-https://ito.krow.kr}
      GOOGLE_CLIENT_ID: ${ITO_GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${ITO_GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${ITO_GOOGLE_CALLBACK_URL:-}
      GITHUB_CLIENT_ID: ${ITO_GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${ITO_GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${ITO_GITHUB_CALLBACK_URL:-}
      RESEND_API_KEY: ${ITO_RESEND_API_KEY:-}
      RESEND_FROM: ${ITO_RESEND_FROM:-}
    volumes:
      - ito_uploads:/app/apps/api/uploads
    networks:
      - internal
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

volumes:
  pgdata:
  ito_uploads:
  caddy_data:
  caddy_config:

networks:
  internal:
  web:
